<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>to-do-list</title>
  <script type="module" src="/src/main.js" defer></script>
</head>

<body>
  <div id="app"></div>
  <div class="main-container">
    <div class="func-container">
      <div class="profile-cont">
        <img src="./src/assets/avatar.png" alt="avatar" class="img-avatar">
        <div>
          <ul>
            <li>Account</li>
            <li>Settings</li>
          </ul>
        </div>
      </div>
      <div class="btn-cont">
        <button class="add-proj-btn">Add project</button>
      </div>
      <div class="project-cont"></div>
    </div>
    <div class="note-container">
      <div class = "add-note-btn-cont">
        <button class="add-note-btn">Add note</button>
      </div>
    </div>
  </div>
  <div>
    <dialog class="proj-dialog">
      <form class = "proj-cont form-container">
         <label for="form-name">Project name:</label>
        <input type="text" name="project-name" id="form-name" required>
        <button type="submit" class="submit-proj">Create project</button>
      </form>
    </dialog>
  </div>
  <div>
    <dialog class="note-dialog">
      <form class="note-cont form-container">
        <label for="form-title">Title:</label>
        <input type="text" name="title" id="form-title" required>
        <label for="form-description">Description:</label>
        <textarea name="description" id="form-description" rows="5" cols="50" placeholder="Your note.."
          required></textarea>
        <label for="form-deadline">Deadline date:</label>
        <input type="date" name="deadline" id="form-deadline" required>
        <label>
          <input type="checkbox" name="priority" id="priority" class="checkbox">
          Is it High priority?</label>
        <button type="submit" class="submit-note">Add note</button>
      </form>
    </dialog>
  </div>




</body>

</html>
